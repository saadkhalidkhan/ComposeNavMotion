name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify publish secrets
        env:
          MAVEN_USER: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASS: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          SIGNING_PASS: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "$MAVEN_USER" ]; then
            echo "::error::Missing repository secret MAVEN_CENTRAL_USERNAME — see .github/SETUP_SECRETS.md"
            missing=1
          fi
          if [ -z "$MAVEN_PASS" ]; then
            echo "::error::Missing repository secret MAVEN_CENTRAL_PASSWORD — see .github/SETUP_SECRETS.md"
            missing=1
          fi
          if [ -z "$SIGNING_KEY" ]; then
            echo "::error::Missing repository secret SIGNING_IN_MEMORY_KEY — see .github/SETUP_SECRETS.md"
            missing=1
          fi
          if [ -z "$SIGNING_PASS" ]; then
            echo "::error::Missing repository secret SIGNING_IN_MEMORY_KEY_PASSWORD — see .github/SETUP_SECRETS.md"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Configure secrets at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required publish secrets are present."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: >
          ./gradlew :navmotion-core:testDebugUnitTest
          :navmotion-material:testDebugUnitTest
          :navmotion-shared:testDebugUnitTest
          --no-daemon --stacktrace

      - name: Publish to Maven Central
        run: ./gradlew :nav-animation:publishToMavenCentral --no-daemon --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signing.useGpgCmd: "false"

      - name: Publish summary
        run: |
          echo "## Maven Central publish finished" >> "$GITHUB_STEP_SUMMARY"
          echo "Check https://central.sonatype.com/publishing/deployments" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: io.github.saadkhalidkhan:composenavmotion" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Next steps:**" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Verify JitPack: https://jitpack.io/#saadkhalidkhan/ComposeNavMotion" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Confirm artifact on repo1.maven.org (may take 10-30 min)" >> "$GITHUB_STEP_SUMMARY"
