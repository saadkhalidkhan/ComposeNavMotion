name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew
      - name: Run unit tests
        run: >
          ./gradlew :navmotion-core:testDebugUnitTest
          :navmotion-material:testDebugUnitTest
          :navmotion-shared:testDebugUnitTest
          --stacktrace
      - name: Assemble sample app
        run: ./gradlew :navmotion-sample:assembleDebug --stacktrace
